<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>self-jam</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    .header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .dot.recording {
      background: #e53e3e;
      box-shadow: 0 0 6px #e53e3e;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .body {
      padding: 14px 16px;
    }

    .record-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .record-btn:active {
      transform: scale(0.98);
    }

    .record-btn.idle {
      background: #e53e3e;
      color: #fff;
    }

    .record-btn.idle:hover {
      background: #c53030;
    }

    .record-btn.recording {
      background: #2d2d2d;
      color: #f0f0f0;
      border: 1px solid #444;
    }

    .record-btn.recording:hover {
      background: #3a3a3a;
    }

    .record-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      text-align: center;
      min-height: 16px;
    }

    .status.active {
      color: #e53e3e;
    }

    .status.success {
      color: #38a169;
    }

    .timer {
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    .stats {
      margin-top: 10px;
      padding: 8px 10px;
      background: #1a1a1a;
      border-radius: 5px;
      display: none;
      gap: 12px;
    }

    .stats.visible {
      display: flex;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 9px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }

    .settings-toggle {
      margin-left: auto;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .settings-toggle:hover { color: #aaa; }

    .settings-panel {
      display: none;
      padding: 12px 16px;
      border-top: 1px solid #222;
    }
    .settings-panel.open { display: block; }

    .settings-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
      margin-top: 10px;
    }
    .settings-label:first-child { margin-top: 0; }

    .settings-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #f0f0f0;
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      font-family: inherit;
    }
    .settings-input:focus { border-color: #555; }
    .settings-input::placeholder { color: #444; }

    .settings-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .settings-save {
      flex: 1;
      background: #2d6a4f;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 6px;
      transition: background 0.15s;
    }
    .settings-save:hover { background: #1b4332; }

    .settings-clear {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      font-size: 11px;
      padding: 6px 10px;
      transition: color 0.15s, border-color 0.15s;
    }
    .settings-clear:hover { color: #aaa; border-color: #555; }

    .settings-hint {
      font-size: 10px;
      color: #444;
      margin-top: 8px;
      line-height: 1.5;
    }
    .settings-hint a { color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <span class="logo">self-jam</span>
    <button class="settings-toggle" id="settingsToggle" title="Settings">⚙</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-label">API URL</div>
    <input class="settings-input" id="settingApiUrl" type="url" placeholder="https://your-bugreel.com" />
    <div class="settings-label">App ID</div>
    <input class="settings-input" id="settingAppId" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
    <div class="settings-label">API Token</div>
    <input class="settings-input" id="settingApiToken" type="password" placeholder="token from workspace settings" />
    <div class="settings-actions">
      <button class="settings-save" id="settingsSave">Save</button>
      <button class="settings-clear" id="settingsClear">Clear</button>
    </div>
    <div class="settings-hint">When configured, recordings are uploaded automatically to the workspace. Leave empty to save as a local .jam file.</div>
  </div>

  <div class="body">
    <button class="record-btn idle" id="recordBtn">
      <span id="btnIcon">⏺</span>
      <span id="btnLabel">Start Recording</span>
    </button>

    <div class="status" id="status">Ready</div>

    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat-value" id="statTime">0s</div>
        <div class="stat-label">Duration</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statConsole">0</div>
        <div class="stat-label">Console</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statNetwork">0</div>
        <div class="stat-label">Network</div>
      </div>
    </div>
  </div>

  <script src="lib/fflate.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
